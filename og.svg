<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="NewSignal Studio. Performance ads for high-ticket services. We don't get paid until your numbers do.">
  <defs>
    <filter id="ogRough" x="-1%" y="-1%" width="102%" height="102%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3" />
      <feDisplacementMap in="SourceGraphic" scale="1.4" />
    </filter>
    <filter id="ogRoughFine" x="-1%" y="-1%" width="102%" height="102%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" seed="9" />
      <feDisplacementMap in="SourceGraphic" scale="0.8" />
    </filter>
  </defs>

  <!-- paper -->
  <rect width="1200" height="630" fill="#F4ECDD" />

  <!-- top rule + wordmark -->
  <g transform="translate(64 60)">
    <g>
      <circle cx="14" cy="14" r="11" fill="none" stroke="#B8412B" stroke-width="1.6" stroke-dasharray="2 2.4" />
      <circle cx="14" cy="14" r="2.4" fill="#B8412B" />
    </g>
    <text x="40" y="22"
          font-family="'Iowan Old Style','Charter','Palatino',Georgia,serif"
          font-size="22" letter-spacing="2" fill="#1F1A14"
          font-variant="small-caps">NewSignal Studio</text>
  </g>
  <line x1="64" y1="100" x2="1136" y2="100"
        stroke="#1F1A14" stroke-opacity="0.18" stroke-width="1" />

  <!-- hero text (2 lines) -->
  <g transform="translate(64 200)" fill="#1F1A14"
     font-family="'Iowan Old Style','Charter','Palatino',Georgia,serif"
     font-weight="600">
    <text x="0" y="0" font-size="78" letter-spacing="-1">Performance ads</text>
    <text x="0" y="92" font-size="78" letter-spacing="-1">for high-ticket services.</text>
  </g>

  <!-- the signature: noise resolving into clean signal locked to a target -->
  <g transform="translate(64 400)">
    <!-- baseline -->
    <line x1="0" y1="80" x2="1072" y2="80"
          stroke="#1F1A14" stroke-opacity="0.32" stroke-width="1" stroke-dasharray="2 4" />

    <!-- noise (left half) -->
    <path d="M0 80
             L 22 36 L 36 124 L 54 44 L 72 130 L 88 42 L 108 132
             L 126 38 L 146 128 L 164 50 L 186 134 L 204 36
             L 226 130 L 246 46 L 268 132 L 288 52 L 310 124
             L 330 56 L 352 116 L 374 64 L 398 104 L 418 72 L 440 92"
          fill="none" stroke="#1F1A14" stroke-width="2.4"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#ogRough)" />

    <!-- lock tick -->
    <line x1="452" y1="20" x2="452" y2="140"
          stroke="#B8412B" stroke-width="1.6" stroke-dasharray="2 3" opacity="0.7" />
    <text x="452" y="8" text-anchor="middle"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" letter-spacing="2.4" fill="#5C4F3D">LOCK</text>

    <!-- clean signal (right half) -->
    <path d="M440 92
             C 466 92, 478 0, 530 0
             C 582 0, 594 160, 646 160
             C 698 160, 710 0, 762 0
             C 814 0, 826 160, 878 160
             C 920 160, 936 92, 968 80"
          fill="none" stroke="#1F1A14" stroke-width="3.4"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#ogRoughFine)" />

    <!-- target -->
    <g transform="translate(968 80)" filter="url(#ogRoughFine)">
      <circle r="32" fill="none" stroke="#1F1A14" stroke-width="1.8" stroke-dasharray="2 3" />
      <circle r="9" fill="#B8412B" />
    </g>

    <!-- KPI label -->
    <text x="952" y="24"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="14" letter-spacing="2" fill="#5C4F3D">KPI</text>
  </g>

  <!-- bottom strip: the offer in one line -->
  <g transform="translate(64 600)">
    <text x="0" y="0"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="14" letter-spacing="2.6" fill="#5C4F3D">WE DON&apos;T GET PAID UNTIL YOUR NUMBERS DO.</text>
  </g>
</svg>
